name: GitHub Classroom Workflow

on: [push]

jobs:
  build-linux:
    permissions: write-all
    name: Autograding
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Set PYTHONPATH to see project modules
      run: |
         echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
    - name: Install dependencies
      run: |
        pip3 install -q -r .devcontainer/requirements.txt
    - name: Force Javascript 24
      run: |
         echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

    - name: Show Python versions
      id: show-python-versions
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Show Python versions'
        setup-command: ''
        command: 'python src/python_versions.py'
        timeout: '10'
        max-score: '0'

    - name: Test Assignment Notebook runs all cells cleanly
      id: test-assignment-notebook
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Assignment Notebook'
        working-directory: './notebooks'
        setup-command: ''
        command: 'jupyter nbconvert --execute Assg-01-Python-with-Numpy.ipynb --to notebook'
        timeout: '10'
        max-score: '10'

    - name: Task 1 test hello_world()
      id: test-task-1
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 1'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_hello_world'
        timeout: '10'
        max-score: '10'

    - name: Task 2.1 test basic_sigmoid()
      id: test-task-2-1
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.1'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_basic_sigmoid'
        timeout: '10'
        max-score: '10'

    - name: Task 2.2 test sigmoid()
      id: test-task-2-2
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.2'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_sigmoid'
        timeout: '10'
        max-score: '10'

    - name: Task 2.3 test sigmoid_grad()
      id: test-task-2-3
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.3'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_sigmoid_grad'
        timeout: '10'
        max-score: '10'

    - name: Task 2.4 test image2vector()
      id: test-task-2-4
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.4'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_image2vector'
        timeout: '10'
        max-score: '10'

    - name: Task 2.5 test normalize_rows()
      id: test-task-2-5
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.5'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_normalize_rows'
        timeout: '10'
        max-score: '10'

    - name: Task 2.6 test softmax()
      id: test-task-2-6
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 2.6'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_softmax'
        timeout: '10'
        max-score: '10'

    - name: Task 3.1 test l2_loss()
      id: test-task-3-1
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 3.1'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_l2_loss'
        timeout: '10'
        max-score: '10'

    - name: Task 3.2 test l1_loss()
      id: test-task-3-2
      uses: etamu-class/autograding-command-grader@v10
      with:
        test-name: 'Test Task 3.2'
        setup-command: ''
        command: 'python -m unittest test_assg_tasks.test_l1_loss'
        timeout: '10'
        max-score: '10'

    - name: Autograding Reporter
      uses: education/autograding-grading-reporter@v1
      env:
        TEST-ASSIGNMENT-NOTEBOOK_RESULTS: "${{steps.test-assignment-notebook.outputs.result}}"
        TEST-TASK-1_RESULTS: "${{steps.test-task-1.outputs.result}}"
        TEST-TASK-2-1_RESULTS: "${{steps.test-task-2-1.outputs.result}}"
        TEST-TASK-2-2_RESULTS: "${{steps.test-task-2-2.outputs.result}}"
        TEST-TASK-2-3_RESULTS: "${{steps.test-task-2-3.outputs.result}}"
        TEST-TASK-2-4_RESULTS: "${{steps.test-task-2-4.outputs.result}}"
        TEST-TASK-2-5_RESULTS: "${{steps.test-task-2-5.outputs.result}}"
        TEST-TASK-2-6_RESULTS: "${{steps.test-task-2-6.outputs.result}}"
        TEST-TASK-3-1_RESULTS: "${{steps.test-task-3-1.outputs.result}}"
        TEST-TASK-3-2_RESULTS: "${{steps.test-task-3-2.outputs.result}}"
      with:
        runners: test-assignment-notebook,test-task-1,test-task-2-1,test-task-2-2,test-task-2-3,test-task-2-4,test-task-2-5,test-task-2-6,test-task-3-1,test-task-3-2
